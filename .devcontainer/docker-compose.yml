version: '3.9'

services:
  db:
    image: mongo:7
    container_name: resto001-mongo-dev
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - resto001-network

  backend:
    build:
      context: ../..
      dockerfile: services/backend/Dockerfile
    container_name: resto001-backend-dev
    restart: unless-stopped
    environment:
      - MONGO_URL=mongodb://db:27017/resto001
    ports:
      - "5000:5000"
    depends_on:
      - db
    networks:
      - resto001-network

  frontend:
    image: node:22-alpine
    container_name: resto001-frontend-dev
    working_dir: /workspace/app/mobile/resto-mobile
    volumes:
      - ../../app/mobile/resto-mobile:/workspace/app/mobile/resto-mobile
    environment:
      - REACT_NATIVE_PACKAGER_HOSTNAME=${LOCAL_IP}
      - EXPO_PUBLIC_API_URL_LOCAL=http://backend:5000
      - EXPO_PUBLIC_SOCKET_URL=http://backend:5000
      - EXPO_NO_TELEMETRY=1
      - CI=1
    command: sh -c "npm install && npx expo start --tunnel --port 8081"
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    depends_on:
      - backend
    networks:
      - resto001-network

volumes:
  mongo_data:

networks:
  resto001-network:
    driver: bridge
